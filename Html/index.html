<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker </title>
    <link rel="stylesheet" href="/Css/index.css">
    
</head>
<body>
  <!--Star a container-->
  <div class="container">
    <h1>Expense Tracker</h1>  
    <!--Start a balance container-->
    <div class="balance-container">
     <h2>Your balance</h2>
     <h1 id="balance">$0.00</h1>
    </div>  
    <!--End of a balance container-->
    <!--Start summary of income and expenses-->
    <div class="summary">
      <div class="income">
        <h3>Income</h3>
        <p id="income-amount">$0.00</p>
      </div>
      <div class="expense">
        <h3>Expense</h3>
        <p id="expense-amount">$0.00</p>
      </div>
    </div>
    </div>
    <!--End of summary of income and expense-->
    <!--Start a main content-->
    <div class="main-content">
      <!--Start a transaction container-->
      <div class="transaction-container">
        <h2>Transaction</h2>
        <ul id="transaction-list">
          <!--Transaction will be inserted here-->
        </ul>
      </div>
      <!--End a transaction container-->
      <!--Start a form container-->
      <div class="form-container">
       <h3>Add Transaction</h3>
       <form id="transaction-form">
       <!--Start a description of amount-->
       <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="Enter description..." required>
       </div>
      </div>
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="Enter amount..." required>
        <small>Use negative for expenses</small>
      </div>
      <button id="form-btn" type="submit">Add Transaction</button>
      </form>
    </div>
  </div>
  <!--End of container-->
  <script src="/Javascript/index.js"></script>
</body>
</html>
